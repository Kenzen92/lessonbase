<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Student Signup</title>
  </head>
  <body>
    <h2>Student Signup</h2>
    <form
      action="{% url 'confirm_account' %}"
      method="post"
    >
      {% csrf_token %}
      <input
        type="hidden"
        name="token"
        value="{{ token }}"
      />
      <label for="username">Username:</label><br />
      <input
        type="text"
        id="username"
        name="username"
        required
      /><br />
      <label for="password1">Password:</label><br />
      <input
        type="password"
        id="password1"
        name="password1"
        required
      /><br />
      <label for="password2">Confirm Password:</label><br />
      <input
        type="password"
        id="password2"
        name="password2"
        required
      /><br />
      <button type="submit">Signup</button>
    </form>
  </body>
</html>
