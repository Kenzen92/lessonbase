services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: kenny
    ports:
      - "5432:5432"
    env_file:
      - .env

  web:
    build: .
    # Use the image's default CMD (entrypoint.sh) so the runtime uses the
    # venv created at build time. Overriding the command with plain
    # `python manage.py` can invoke a Python without installed deps.
    # If you need to run the dev server directly here, ensure PATH points
    # to the venv or run `/opt/venv/bin/python`.
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: kenny
      UV_SYSTEM_PYTHON: "1"
    depends_on:
      - db
    env_file:
      - .env
