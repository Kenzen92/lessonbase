# fly.toml app configuration file generated for backend-late-haze-5388 on 2025-06-30T16:12:32+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backend-late-haze-5388'
primary_region = 'fra'
console_command = '/app/lessonbase/manage.py shell'

[build]

[deploy]
  release_command = '/app/migrate.sh'


[env]
  PORT = '8000'
  ENVIRONMENT = 'production'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[[statics]]
  guest_path = '/app/lessonbase/static'
  url_prefix = '/static/'

[[services.tcp_checks]]
  grace_period = "30s"
  interval = "15s"
  timeout = "2s"