version: "3.9"

services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: kenny
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      UV_SYSTEM_PYTHON: "1"
      PYTHONUNBUFFERED: "1"
      ENVIRONMENT: "production"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data:
